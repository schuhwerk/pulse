<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>PULSE — Workout Timer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#282828;
--text:#f0f0f0;--text2:#888;--text3:#555;
--accent:#c8ff2e;--accent2:#a8e600;--danger:#ff4757;--warn:#ffa502;
--radius:14px;--radius-sm:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);position:relative}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;outline:none;width:100%}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}

/* App Shell */
#app{height:100%;display:flex;flex-direction:column;overflow:hidden;max-width:480px;margin:0 auto;position:relative}
.view{display:none;flex-direction:column;height:100%;overflow:hidden}
.view.active{display:flex}

/* Header */
.header{padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.header .subtitle{font-size:12px;color:var(--text2);margin-left:auto;font-family:'Space Mono',monospace}
.btn-icon{width:40px;height:40px;flex:0 0 40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface2);transition:all .15s}
.btn-icon:hover{background:var(--surface3)}
.btn-icon svg{width:20px;height:20px}

/* Scrollable Content */
.content{flex:1;overflow-y:auto;padding:0 20px 130px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);padding:12px;margin-bottom:8px;position:relative;transition:transform .1s}
.card:active{transform:scale(.98)}

/* Training Card */
.training-card{display:flex;align-items:center;gap:14px;cursor:pointer}
.training-card .info{flex:1;min-width:0}
.training-card .name{font-weight:700;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.training-card .meta{font-size:13px;color:var(--text2);margin-top:3px;font-family:'Space Mono',monospace}
.training-card .arrow{color:var(--text3);flex-shrink:0}
.training-card .play-btn{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s}
.training-card .play-btn:hover{transform:scale(1.1)}
.training-card .play-btn:active{transform:scale(.94);opacity:.85}
.training-card .play-btn svg{fill:var(--bg);margin-left:2px}
.training-count{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#000;font-weight:700;font-size:12px;width:28px;height:28px;border-radius:50%;font-family:'Space Mono',monospace}

/* Exercise Card */
.exercise-card{display:flex;gap:8px;align-items:center;padding:12px}
.exercise-card .thumb{width:56px;height:56px;border-radius:8px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.exercise-card .thumb img{width:100%;height:100%;object-fit:contain;border-radius:4px;padding:4px;box-sizing:border-box}
.wger-img{background:#ede8e1}
.exercise-card .info{flex:1;min-width:0}
.exercise-card .ex-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exercise-card .ex-dur{font-size:12px;color:var(--accent);font-family:'Space Mono',monospace;margin-top:1px;display:flex;align-items:center;gap:6px}
.exercise-card .ex-actions{display:flex;gap:2px;flex-shrink:0}
.exercise-card .ex-actions button{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.exercise-card .ex-actions button:hover{background:var(--surface3)}
.exercise-card .ex-actions svg{width:14px;height:14px}
.quick-btn{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--text2);background:var(--surface2);border-radius:4px;padding:2px 5px;cursor:pointer;border:none;line-height:1}
.quick-btn:hover{background:var(--surface3);color:var(--text)}
/* Touch reorder */
.exercise-card.dragging{opacity:.4;user-select:none}
.exercise-card.drag-over-top{box-shadow:0 -2px 0 var(--accent)}
.exercise-card.drag-over-bot{box-shadow:0 2px 0 var(--accent)}
.drag-ghost{position:fixed;z-index:200;pointer-events:none;opacity:.9;transform:scale(1.03);box-shadow:0 8px 30px rgba(0,0,0,.5);border-radius:var(--radius);background:var(--surface);max-width:calc(100vw - 40px)}
.reorder-hint{text-align:center;padding:6px;font-size:11px;color:var(--text3);font-family:'Space Mono',monospace}
.last-done{font-size:11px;color:var(--text3);margin-top:1px}

/* Floating Action Button */
.fab{position:absolute;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:300;box-shadow:0 4px 20px rgba(200,255,46,.3);transition:all .15s;z-index:10}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 30px rgba(200,255,46,.45)}
.fab:active{transform:scale(.95)}

/* Play Button */
.play-fab{background:var(--accent);width:64px;height:64px;font-size:0;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:10}
.play-fab svg{width:28px;height:28px}
.play-fab:hover{transform:translateX(-50%) scale(1.08)}

/* Bottom Bar */
.bottom-bar{display:flex;gap:8px;padding:12px 20px;flex-shrink:0;background:var(--bg)}
.bottom-bar .btn{flex:1;padding:12px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;text-align:center;transition:all .15s}
.btn{padding:12px;border-radius:var(--radius-sm);font-weight:700;transition:all .15s}
.btn-block{width:100%}
.btn-sm,.setting-row .btn{padding:8px 16px;font-size:13px;font-weight:600}
.modal-actions{display:flex;gap:8px}
.modal-actions .btn{flex:1}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:rgba(255,71,87,.15);color:var(--danger)}
.btn-danger:hover{background:rgba(255,71,87,.25)}

/* Search */
.search-box{position:relative;margin-bottom:16px}
.search-box input{padding-left:40px}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text3)}
.search-results{margin-top:8px}
.search-result{padding:10px 12px;cursor:pointer;border-radius:var(--radius-sm);transition:background .1s;display:flex;align-items:center;gap:10px}
.search-result:hover{background:var(--surface2)}
.search-result .sr-thumb{width:48px;height:48px;border-radius:8px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.search-result .sr-thumb img{width:100%;height:100%;object-fit:contain}
.search-result .sr-info{flex:1;min-width:0}
.search-result .sr-name{font-weight:600;font-size:15px}
.search-result .sr-cat{font-size:12px;color:var(--text2);margin-top:2px}
.lang-toggle{display:inline-flex;border-radius:6px;overflow:hidden;background:var(--surface);font-size:12px;font-weight:600}
.lang-toggle button{padding:4px 10px;background:none;color:var(--text2);border:none;cursor:pointer;transition:all .15s}
.lang-toggle button.active{background:var(--accent);color:#000}
.search-loader{text-align:center;padding:30px;color:var(--text2);font-size:14px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column}
.modal-header{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--surface2)}
.modal-header h2{font-size:17px;font-weight:700;flex:1}
.modal-body{padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-body label{font-size:13px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.field{display:flex;flex-direction:column;gap:4px}
.dur-input{display:flex;align-items:center;gap:10px}
.dur-input input{width:80px;text-align:center;font-family:'Space Mono',monospace;font-size:18px}
.dur-input span{color:var(--text2);font-size:13px}

/* Player View */
.player{background:var(--bg);display:grid;grid-template-rows:1fr auto auto;height:100%;padding:20px 20px 0;text-align:center;position:relative;overflow:hidden}
.player-top-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;overflow:hidden;overflow-y:auto;position:relative}
.player-phase{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.player-exercise{font-size:26px;font-weight:800;margin-bottom:4px;line-height:1.2;padding:0 20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.player-desc-wrap{position:relative;flex-shrink:0;padding:0 20px;min-height:0}
.player-desc{font-size:14px;color:var(--text2);line-height:1.5;max-height:12em;overflow:hidden}
.player-desc-wrap.expanded .player-desc{max-height:none;overflow:visible}
.player-desc-wrap .more-btn{display:none;margin-top:4px;font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;padding:2px 0}
.player-desc-wrap.has-overflow .more-btn{display:inline-block}
.player-image-wrap{position:relative;flex-shrink:0;margin-bottom:24px}
.player-image{width:140px;height:140px;border-radius:50%;background:var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:56px;border:3px solid var(--surface3)}
.player-image.has-img{border-radius:16px;width:200px;height:200px;padding:12px}
.player-image img{width:100%;height:100%;object-fit:contain}
#pl-upnext{position:absolute;bottom:-18px;left:50%;background:rgba(0,0,0,.85);color:var(--warn);font-size:18px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:2px;padding:6px 18px;border-radius:24px;white-space:nowrap;z-index:3;backdrop-filter:blur(4px);pointer-events:none;transform:translateX(-50%);opacity:0}
#pl-upnext.visible{animation:badge-in .3s cubic-bezier(.34,1.4,.64,1) forwards}
#pl-upnext.out{animation:badge-out .25s ease-in forwards}
@keyframes badge-in{from{transform:translateX(calc(-50% - 60px));opacity:0}to{transform:translateX(-50%);opacity:1}}
@keyframes badge-out{from{transform:translateX(-50%);opacity:1}to{transform:translateX(calc(-50% + 60px));opacity:0}}
.player-mid-zone{display:flex;flex-direction:column;align-items:center;padding:12px 0}
.player-timer{font-family:'Space Mono',monospace;font-size:80px;font-weight:700;line-height:1}
.player-timer.rest-time{color:var(--warn)}
.player-progress{width:100%;max-width:300px;height:4px;background:var(--surface2);border-radius:2px;margin-top:12px;overflow:hidden}
.player-progress-bar{height:100%;background:var(--accent);transition:width .3s linear;border-radius:2px}
.player-progress-bar.resting{background:var(--warn)}
.player-bot-zone{display:flex;flex-direction:column;align-items:center;padding-bottom:max(20px,env(safe-area-inset-bottom));flex-shrink:0}
.player-controls{display:flex;gap:20px;margin-top:12px;align-items:center}
.player-controls button{width:52px;height:52px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.player-controls button svg{width:22px;height:22px}
.player-controls .play-pause{width:68px;height:68px;background:var(--accent);color:#000}
.player-controls .play-pause svg{width:28px;height:28px}
.player-counter{font-family:'Space Mono',monospace;font-size:12px;color:var(--text3);margin-top:10px;letter-spacing:1px}
.player-top{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;z-index:2}
.player-upcoming{font-size:13px;color:var(--text3);margin-top:6px;min-height:18px}
.player-upcoming span{color:var(--text2)}
.player-timer.finish-check{color:#000;background:var(--accent);width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:68px;margin:24px auto;cursor:pointer;border:none;box-shadow:0 6px 24px rgba(200,255,46,.35);transition:transform .15s}
.player-timer.finish-check:hover{transform:scale(1.05)}
.player-timer.finish-check:active{transform:scale(.96)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);color:var(--text);padding:12px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty State */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}

/* Settings row */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--surface2)}
.setting-row input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;height:20px;border:none;outline:none;margin:0 8px 0 0;padding:0}
.setting-row input[type=range]:focus{outline:none}
.setting-row input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:rgba(255,255,255,.18)}
.setting-row input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:rgba(255,255,255,.18)}
.setting-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);margin-top:-6px;border:none}
.setting-row input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);border:none}
.setting-row input[type=range].muted::-webkit-slider-thumb{background:#e5484d}
.setting-row input[type=range].muted::-moz-range-thumb{background:#e5484d}
.setting-row:last-child{border:none}
.setting-label{font-size:15px}
.setting-label small{display:block;color:var(--text2);font-size:12px;margin-top:2px}
.toggle{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,.18);cursor:pointer;transition:background .2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}

/* Inline tag */
.tag{display:inline-block;background:var(--surface3);color:var(--text2);font-size:11px;padding:2px 6px;border-radius:4px;font-family:'Space Mono',monospace;vertical-align:middle;margin-left:4px}

/* Countdown overlay */
.countdown-overlay{position:fixed;inset:0;background:var(--bg);z-index:150;display:flex;align-items:center;justify-content:center;flex-direction:column}
.countdown-overlay .number{font-family:'Space Mono',monospace;font-size:120px;font-weight:700;color:var(--accent);animation:pulse .6s ease-in-out infinite alternate}
.countdown-overlay .label{font-size:14px;color:var(--text2);margin-top:10px;letter-spacing:2px;text-transform:uppercase}
@keyframes pulse{from{transform:scale(1);opacity:1}to{transform:scale(1.15);opacity:.7}}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;color:var(--text2);background:var(--surface);transition:all .15s;cursor:pointer}
.tab.active{background:var(--accent);color:#000}
</style>
</head>
<body>
<div id="app">

<!-- HOME VIEW -->
<div id="view-home" class="view active">
  <div class="header">
    <h1>PULSE</h1>
    <span class="subtitle">workout timer</span>
    <button class="btn-icon" onclick="openSettings()" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>
  <div class="content" id="home-list"></div>
  <button class="fab" onclick="promptNewTraining()" title="New Training">+</button>
</div>

<!-- TRAINING DETAIL VIEW -->
<div id="view-detail" class="view">
  <div class="header">
    <button class="btn-icon" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1 id="detail-title">Training</h1>
    <span class="subtitle" id="detail-duration">0:00</span>
    <button class="btn-icon" onclick="shareTraining()" title="Share">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
    <button class="btn-icon" onclick="editTrainingName()" title="Edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>
  <p id="detail-desc" style="margin:0 16px 8px;font-size:14px;color:var(--text3);display:none"></p>
  <div class="content" id="detail-exercises"></div>
  <button class="play-fab fab" onclick="startPlayer()" title="Start">
    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
  </button>
  <button class="fab" style="right:20px;bottom:100px;width:48px;height:48px;font-size:24px;background:var(--surface2);color:var(--accent);box-shadow:0 2px 12px rgba(0,0,0,.4)" onclick="openAddExercise()" title="Add Exercise">+</button>
</div>

<!-- ADD EXERCISE VIEW -->
<div id="view-add" class="view">
  <div class="header">
    <button class="btn-icon" onclick="goDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1>Add Exercise</h1>
  </div>
  <div class="content">
    <div class="tabs">
      <div class="tab active" data-tab="search" onclick="switchTab(this,'search')">wger Search</div>
      <div class="tab" data-tab="manual" onclick="switchTab(this,'manual')">Manual</div>
    </div>
    <div id="tab-search">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <div class="search-box" style="flex:1;margin-bottom:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="wger-search" type="text" placeholder="Search exercises…" oninput="debounceSearch()">
        </div>
        <div class="lang-toggle" id="lang-toggle"></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px" id="equip-filters"></div>
      <a href="https://wger.de/en/exercise/overview/" target="_blank" rel="noopener" style="display:block;font-size:12px;color:var(--text3);margin:0 0 12px;text-decoration:none">Browse all exercises on wger.de →</a>

    // Check if there's already a waiting worker
    if (reg.waiting) handleSwWaiting(reg.waiting);

    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          handleSwWaiting(newSW);
        }
      });

  });

  // Reload once the new SW takes over
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {

  });
}

      ex('Prone YTWL with Chin Tuck + Weight','🦅',50,'','','Lying face down with light weights, perform Y-T-W-L arm raises while keeping a chin tuck and lifting head/chest slightly. Thumbs up, actively retract shoulder blades.'),

function defaultSecondstate(){
  return { trainings: BUILTIN_TRAININGS.map(hydrateBuiltin), settings:{ restDefault:8, audioEnabled:true, autoUpdate:true }, version: APP_VERSION };
}
function ex(name,emoji,dur,hint,img,desc){ return {name,emoji,s:dur,description:desc,imageUrl:img}; }
function validateSharePayload(obj){
  if(!obj || typeof obj!=='object' || !Array.isArray(obj.exercises)) throw new Error('Invalid training payload');
  return obj;
}
let _pendingImport=null;
// Show a confirmation modal with a quick overview before importing.
function confirmImportTraining(payload){
  try{ validateSharePayload(payload); }
  catch(e){ toast(e.message||'Invalid training'); return; }
  const t=hydrateTraining(payload);
  const dur=t.exercises.reduce((s,e,i)=>s+e.s+(i<t.exercises.length-1?getRestAfter(e,t):0),0);
  const mins=Math.floor(dur/60), secs=dur%60;
  const list=t.exercises.map(e=>`<li style="margin:2px 0">${e.emoji} ${esc(e.name)} <span style="color:var(--text3)">· ${e.s}s</span></li>`).join('');
  _pendingImport=t;
  openModal('Import Training',`
    <div style="font-weight:700;font-size:16px;margin-bottom:4px">${esc(t.name)}</div>
    ${t.description?`<div style="color:var(--text3);font-size:13px;margin-bottom:8px;white-space:pre-wrap">${autolink(t.description)}</div>`:''}
    <div style="color:var(--text2);font-size:13px;margin-bottom:8px">${t.exercises.length} exercises · ${mins}:${String(secs).padStart(2,'0')} total</div>
    <ul style="margin:0 0 12px;padding-left:18px;font-size:13px;max-height:220px;overflow:auto">${list}</ul>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cancelPendingImport()">Cancel</button>
      <button class="btn btn-primary" onclick="commitPendingImport()">Import</button>
    </div>
  `);
}
function cancelPendingImport(){ _pendingImport=null; closeModal(); if(location.hash.startsWith('#import=')) history.replaceState(null,'',location.pathname+location.search); }
let _pendingFullImport=null;
function confirmFullImport(d){
  _pendingFullImport=d;
  const nNew=(d.trainings||[]).length;
  const nCur=(state.trainings||[]).length;
  const names=(d.trainings||[]).map(t=>`<li style="margin:2px 0">${esc(t.name||'Untitled')} <span style="color:var(--text3)">· ${(t.exercises||[]).length} ex</span></li>`).join('');
  openModal('Import Backup',`
    <div style="color:var(--warn);font-weight:700;font-size:14px;margin-bottom:8px">⚠ This will overwrite all your data</div>
    <div style="color:var(--text2);font-size:13px;margin-bottom:8px">Replacing <b>${nCur}</b> training${nCur===1?'':'s'} with <b>${nNew}</b> from the backup file. Settings will also be replaced. This cannot be undone.</div>
    <ul style="margin:0 0 12px;padding-left:18px;font-size:13px;max-height:200px;overflow:auto">${names}</ul>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" onclick="cancelFullImport()">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="commitFullImport()">Overwrite</button>
    </div>
  `);
}
function cancelFullImport(){ _pendingFullImport=null; closeModal(); }
function commitFullImport(){
  const d=_pendingFullImport; if(!d) return;
  _pendingFullImport=null;
  state=d; save(); closeModal(); goHome(); toast('Imported!');
}
function commitPendingImport(){
  const t=_pendingImport; if(!t) return;
  _pendingImport=null;
  closeModal();
  state.trainings.push(t); save();
  currentTrainingId=t.id;
  toast('Imported: '+t.name);
  location.hash='detail:'+t.id;
}
// Normalize a plain training (builtin, imported, or exported) → stored training with fresh ids.
function hydrateTraining(t){
  const defaultSeconds = Number.isFinite(t.defaultSeconds) ? t.defaultSeconds : 30;
  return {
    id: uid(),
    name: String(t.name||'Untitled'),
    description: t.description||'',
    restSeconds: Number.isFinite(t.restSeconds)?t.restSeconds:8,
    exercises: (t.exercises||[]).map(e=>{
      const o={ id:uid(), name:String(e.name||''), description:e.description||'', imageUrl:e.imageUrl||'', emoji:e.emoji||'💪', s:Number.isFinite(e.s)?e.s:defaultSeconds };
      if(e.restAfterSeconds!=null) o.restAfterSeconds=Number(e.restAfterSeconds);
      return o;
    }),
  };
}
function builtinFingerprint(t){ return JSON.stringify(t); }
function hydrateBuiltin(t){ const h=hydrateTraining(t); h.builtinId=t.builtinId; h.builtinHash=builtinFingerprint(t); return h; }
// Serialize a training to a compact payload (shared by share-link and JSON export).
// Picks the most common exercise duration as `defaultSeconds`; exercises matching it omit `s`.
function toSharePayload(t){
  const counts={};
  for(const e of t.exercises){ counts[e.s]=(counts[e.s]||0)+1; }
  let defaultSeconds=null, best=0;
  for(const k in counts){ if(counts[k]>best){ best=counts[k]; defaultSeconds=Number(k); } }
  const p={ name:t.name, restSeconds:t.restSeconds };
  if(t.description) p.description=t.description;
  if(defaultSeconds!=null) p.defaultSeconds=defaultSeconds;
  p.exercises=t.exercises.map(e=>{
    const o={ name:e.name, emoji:e.emoji };
    if(e.s!==defaultSeconds) o.s=e.s;
    if(e.description) o.description=e.description;
    if(e.imageUrl) o.imageUrl=e.imageUrl;
    if(e.restAfterSeconds!=null) o.restAfterSeconds=e.restAfterSeconds;
    return o;
  });
  return p;
}
function encodeShareUrl(t){
  const json=JSON.stringify(toSharePayload(t));
  const b64=btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return location.origin+location.pathname+'#import='+b64;
}
function decodeSharePayload(s){
  const b64=s.replace(/-/g,'+').replace(/_/g,'/');
  const json=decodeURIComponent(escape(atob(b64)));
  return JSON.parse(json);
}
async function shareTraining(){
  const t=getTraining(); if(!t) return;
  const url=encodeShareUrl(t);
  try{
    if(navigator.share){ await navigator.share({title:t.name,url}); }
    else{ await navigator.clipboard.writeText(url); toast('Link copied'); }
  }catch(e){ /* user cancelled */ }
}
function exportTraining(){
  const t=getTraining(); if(!t) return;
  const blob=new Blob([JSON.stringify(toSharePayload(t),null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(t.name||'training').replace(/[^a-z0-9-_ ]/gi,'_')+'.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function load(){
  try{
    const d=localStorage.getItem(LS_KEY);
    if(!d) return defaultSecondstate();
    const parsed=JSON.parse(d);
    // Defensive: ensure every exercise has a numeric `s` so the UI never shows NaN
    for(const t of parsed.trainings||[]){
      for(const e of t.exercises||[]){ if(!Number.isFinite(e.s)) e.s=Number.isFinite(e.durationSeconds)?e.durationSeconds:30; }
    }
    return parsed;
  }catch(e){ console.error('LOAD ERROR', e); return defaultSecondstate(); }
}
state = load();
const _pendingUpdate = onVersionChange();
function save(){ localStorage.setItem(LS_KEY,JSON.stringify(state)); }
function toast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000); }
function getRestAfter(e,t){ return (e.restAfterSeconds!=null)?e.restAfterSeconds:(t.restSeconds!=null?t.restSeconds:8); }
function autoUpdateEnabled(){ return state.settings.autoUpdate !== false; }
function onVersionChange(){
  if(state.version === APP_VERSION) return null;
  window.__ovc = [];
  const changed = BUILTIN_TRAININGS.filter(b => {
    const stored = state.trainings.find(t => t.builtinId === b.builtinId);
    const fp = builtinFingerprint(b);
    window.__ovc.push({ builtinId: b.builtinId, found: !!stored, hash: stored?.builtinHash, fpSlice: fp.slice(0,20), eq: stored?.builtinHash === fp });
    return stored && stored.builtinHash && stored.builtinHash !== fp;
  });
  state.version = APP_VERSION; save();
  window.__ovcLen = changed.length;
  return changed.length ? changed : null;
}
let _pendingBuiltinUpdates = null;
function promptBuiltinUpdate(changed){
  _pendingBuiltinUpdates = changed;
  const names = changed.map(b=>`<li style="margin:2px 0">${esc(b.name)}</li>`).join('');
  openModal('Built-in trainings updated',`
    <div style="color:var(--text2);font-size:13px;margin-bottom:8px">These default trainings changed in v${APP_VERSION}:</div>
    <ul style="margin:0 0 12px;padding-left:18px;font-size:13px">${names}</ul>
    <div style="color:var(--text2);font-size:13px;margin-bottom:12px">Replace your copies with the updated versions?</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeBuiltinUpdateModal()">Keep mine</button>
      <button class="btn btn-primary" onclick="applyBuiltinUpdates()">Update</button>
    </div>
  `);
}
function closeBuiltinUpdateModal(){ _pendingBuiltinUpdates=null; closeModal(); }
function applyBuiltinUpdates(){
  if(!_pendingBuiltinUpdates) return;
  _pendingBuiltinUpdates.forEach(b=>{
    const idx=state.trainings.findIndex(t=>t.builtinId===b.builtinId);
    if(idx>=0) state.trainings[idx]=hydrateBuiltin(b);
  });
  _pendingBuiltinUpdates=null;
  save(); closeModal(); renderHome(); toast('Trainings updated!');
}

// ─── Navigation ───────────────────────────────────────────────
function showView(id){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active'); }
function goHome(){
  if(location.hash&&location.hash!=='#'){
    history.pushState(null,'',location.pathname+location.search);
    routeHash();
  }
}
function goDetail(){ location.hash='detail:'+currentTrainingId; }

window.addEventListener('hashchange',()=>routeHash());
function routeHash(){
  const h=location.hash.slice(1);
  if(h.startsWith('import=')){
    try{
      const payload=decodeSharePayload(h.slice(7));
      history.replaceState(null,'',location.pathname+location.search); showView('view-home'); renderHome();
      confirmImportTraining(payload);
    }catch(e){ toast('Invalid share link'); history.replaceState(null,'',location.pathname+location.search); return routeHash(); }
    return;
  }
  if(!h||h==='home'){ showView('view-home'); renderHome(); }
  else if(h.startsWith('detail:')){
    currentTrainingId=h.slice(7);
    const t=getTraining(); if(!t){goHome();return;}
    showView('view-detail'); renderDetail();
  }
  else if(h.startsWith('add:')){ currentTrainingId=h.slice(4); const t=getTraining(); if(!t){goHome();return;} showView('view-add'); }
  else if(h.startsWith('player:')){ currentTrainingId=h.slice(7); if(pl.training){showView('view-player');}else{goDetail();} } // fall back to detail on reload (no player state)
}

// ─── Home View ────────────────────────────────────────────────
function renderHome(){
  const c=document.getElementById('home-list');
  if(!state.trainings.length){ c.innerHTML='<div class="empty-state"><div class="icon">🏋️</div><p>No trainings yet.<br>Tap + to create one.</p></div>'; return; }
  c.innerHTML=state.trainings.map(t=>{
    const dur=t.exercises.reduce((s,e,i)=>s+e.s+(i<t.exercises.length-1?getRestAfter(e,t):0),0);
    const mins=Math.floor(dur/60), secs=dur%60;
    const ago=t.lastCompleted?timeAgo(t.lastCompleted):'';
    return `<div class="card training-card" onclick="openTraining('${t.id}')">
      <span class="training-count">${t.exercises.length}</span>
      <div class="info"><div class="name">${esc(t.name)}</div><div class="meta">${mins}:${String(secs).padStart(2,'0')} total</div>${ago?`<div class="last-done">✓ ${ago}</div>`:''}</div>
      <button class="play-btn" title="Start workout" onclick="event.stopPropagation();currentTrainingId='${t.id}';startPlayer()"><svg width="18" height="18" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></button>
    </div>`;
  }).join('');
}

function promptNewTraining(){
  const name=prompt('Training name:','New Training');
  if(!name)return;
  state.trainings.push({id:uid(),name,restSeconds:8,exercises:[]});
  save(); renderHome();
}

function openTraining(id){ currentTrainingId=id; goDetail(); }

// ─── Detail View ──────────────────────────────────────────────
function getTraining(){ return state.trainings.find(t=>t.id===currentTrainingId); }

function renderDetail(){
  const t=getTraining(); if(!t)return goHome();
  document.getElementById('detail-title').textContent=t.name;
  const dur=t.exercises.reduce((s,e,i)=>s+e.s+(i<t.exercises.length-1?getRestAfter(e,t):0),0);

// Time ago helper
function timeAgo(ts){
  const d=Date.now()-new Date(ts).getTime(),s=Math.floor(d/1000),m=Math.floor(s/60),h=Math.floor(m/60),dy=Math.floor(h/24);
  if(dy>30)return new Date(ts).toLocaleDateString();
  if(dy>0)return dy===1?'yesterday':dy+' days ago';
  if(h>0)return h+'h ago';
  if(m>0)return m+'m ago';
  return 'just now';
}

// ─── Reorder (touch + mouse) ──────────────────────────────────
let drag={active:false,timer:null,idx:null,ghost:null,startY:0,startX:0,cards:[],overIdx:null,card:null,decided:false};
const CONTAINER_ID='detail-exercises';
function initTouchReorder(){
  const c=document.getElementById(CONTAINER_ID);
  c.removeEventListener('touchstart',drStart);
  c.removeEventListener('touchmove',drMoveT);
  c.removeEventListener('touchend',drEndT);
  c.removeEventListener('touchcancel',drEndT);
  c.removeEventListener('mousedown',drStartM);
  c.addEventListener('touchstart',drStart,{passive:false});
  c.addEventListener('touchmove',drMoveT,{passive:false});
  c.addEventListener('touchend',drEndT,{passive:false});
  c.addEventListener('touchcancel',drEndT,{passive:false});
  c.addEventListener('mousedown',drStartM);
}
function drPos(ev){return ev.touches?{x:ev.touches[0].clientX,y:ev.touches[0].clientY}:{x:ev.clientX,y:ev.clientY};}
function drCancelOnSelect(){if(!drag.active){clearTimeout(drag.timer);drag.timer=null;}document.removeEventListener('selectstart',drCancelOnSelect);}
function drStart(ev){
  if(ev.target.closest('button,.quick-btn'))return;
  const card=ev.target.closest('.exercise-card');if(!card)return;
  const p=drPos(ev);
  drag.startY=p.y;drag.startX=p.x;drag.card=card;drag.decided=false;drag.overIdx=null;
  document.addEventListener('selectstart',drCancelOnSelect);
  drag.timer=setTimeout(()=>drActivate(card,parseInt(card.dataset.idx)),400);
}
function drStartM(ev){
  if(ev.target.closest('button,.quick-btn'))return;
  if(ev.detail>1)return; // double-click = text selection, don't start reorder
  const card=ev.target.closest('.exercise-card');if(!card)return;
  drag.startY=ev.clientY;drag.startX=ev.clientX;drag.card=card;drag.decided=false;drag.overIdx=null;
  document.addEventListener('selectstart',drCancelOnSelect);
  drag.timer=setTimeout(()=>{
    drActivate(card,parseInt(card.dataset.idx));
    document.addEventListener('mousemove',drMoveM);
    document.addEventListener('mouseup',drEndM);
  },400);
  // cancel if mouse leaves, moves, or releases before timer
  const cancel=()=>{
    if(!drag.active){clearTimeout(drag.timer);drag.timer=null;}
    card.removeEventListener('mouseleave',cancel);
    document.removeEventListener('mouseup',cancel);
    document.removeEventListener('mousemove',moveCancel);
  };
  const moveCancel=(e)=>{
    if(drag.active)return;
    if(Math.abs(e.clientX-drag.startX)>5||Math.abs(e.clientY-drag.startY)>5)cancel();
  };
  card.addEventListener('mouseleave',cancel);
  document.addEventListener('mouseup',cancel);
  document.addEventListener('mousemove',moveCancel);
}
function drActivate(card,idx){
  drag.active=true;drag.idx=idx;drag.decided=true;
  navigator.vibrate&&navigator.vibrate(30);
  const r=card.getBoundingClientRect();
  const g=card.cloneNode(true);
  g.classList.add('drag-ghost');g.style.width=r.width+'px';g.style.left=r.left+'px';g.style.top=r.top+'px';
  document.body.appendChild(g);drag.ghost=g;
  card.classList.add('dragging');
  // Only cards inside the container, NOT the ghost in body
  drag.cards=[...document.getElementById(CONTAINER_ID).querySelectorAll('.exercise-card')];
}
function drMoveAt(x,y){
  if(drag.active){
    if(drag.ghost)drag.ghost.style.top=(y-30)+'px';
    // Auto-scroll when near edges of the scroll container
    const container=document.getElementById(CONTAINER_ID);
    const cr=container.getBoundingClientRect();
    const edge=50;
    if(y<cr.top+edge)container.scrollTop-=8;
    else if(y>cr.bottom-edge)container.scrollTop+=8;
    drag.cards.forEach(c=>{c.classList.remove('drag-over-top','drag-over-bot');});
    let over=null;
    drag.cards.forEach(c=>{
      const r=c.getBoundingClientRect();
      if(y>r.top&&y<r.bottom)over=c;
    });
    if(over&&parseInt(over.dataset.idx)!==drag.idx){
      const r=over.getBoundingClientRect(),mid=r.top+r.height/2;
      over.classList.add(y<mid?'drag-over-top':'drag-over-bot');
      drag.overIdx=parseInt(over.dataset.idx)+(y<mid?0:1);
      if(drag.overIdx>drag.idx)drag.overIdx--;
    }
    return true;
  }
  return false;
}
function drMoveT(ev){
  if(!drag.timer&&!drag.active)return;
  const p=drPos(ev);
  if(drMoveAt(p.x,p.y)){ev.preventDefault();return;}
  if(!drag.decided){
    if(Math.abs(p.x-drag.startX)>5||Math.abs(p.y-drag.startY)>5){
      clearTimeout(drag.timer);drag.timer=null;drag.decided=true;
    }
  }
}
function drMoveM(ev){
  if(!drag.active)return;
  ev.preventDefault();
  drMoveAt(ev.clientX,ev.clientY);
}
function drFinish(){
  clearTimeout(drag.timer);drag.timer=null;
  if(drag.ghost){drag.ghost.remove();drag.ghost=null;}
  if(drag.cards.length)drag.cards.forEach(c=>{c.classList.remove('dragging','drag-over-top','drag-over-bot');});
  if(drag.active&&drag.overIdx!==null&&drag.overIdx!==drag.idx){
    const t=getTraining(),item=t.exercises.splice(drag.idx,1)[0];
    t.exercises.splice(drag.overIdx,0,item);save();renderDetail();
  }
  drag.active=false;drag.idx=null;drag.overIdx=null;drag.card=null;drag.decided=false;drag.cards=[];
}
function drEndT(){drFinish();}
function drEndM(){document.removeEventListener('mousemove',drMoveM);document.removeEventListener('mouseup',drEndM);drFinish();}

const LANG_IDS={en:2,de:1};

async function searchWger(){
  const q=document.getElementById('wger-search').value.trim();
  const c=document.getElementById('wger-results');
  if(!q){c.innerHTML='<div class="search-loader">Type to search…</div>';return;}
  c.innerHTML='<div class="search-loader">Searching…</div>';
  try{
    const equipParams=[...selectedEquipment].map(id=>'&equipment='+id).join('');
    // When searching in German, include English results too
    const langCodes=wgerLang==='de'?'de,en':'en';
    const url=`https://wger.de/api/v2/exerciseinfo/?format=json&name__search=${encodeURIComponent(q)}&language__code=${langCodes}${equipParams}&limit=50&offset=0`;
    const r=await fetch(url);
    const data=await r.json();
    const exercises=(data.results||[]).slice(0,25);
    wgerSearchResults=exercises;
    if(!exercises.length){c.innerHTML='<div class="search-loader">No exercises found for "'+esc(q)+'"</div>';return;}
    c.innerHTML=exercises.map((e,i)=>{
      const tr=wgerTr(e);
      const desc=wgerDesc(e);
      const cat=e.category?e.category.name:'';
      const muscles=(e.muscles||[]).map(m=>m.name_en||m.name).join(', ');
      const equip=(e.equipment||[]).map(eq=>eq.name).join(', ');
      const img=(e.images&&e.images[0])?wgerImg(e.images[0].image):'';
      const descFlat=desc.replace(/\n+/g,' ');
      const descSnip=descFlat.length>80?descFlat.slice(0,80)+'…':descFlat;
      return `<div class="card search-result" onclick="pickWgerResult(${i})">
        ${img?`<div class="sr-thumb"><img src="${esc(img)}" alt="" loading="lazy"></div>`:''}
        <div class="sr-info"><div class="sr-name">${esc(tr.name||'?')}</div>
        <div class="sr-cat">${esc(cat)}${muscles?' · '+esc(muscles):''}${equip?' · '+esc(equip):''}</div>
        ${descSnip?`<div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.3">${esc(descSnip)}</div>`:''}</div>
      </div>`;
    }).join('');
  }catch(err){c.innerHTML='<div class="search-loader">⚠️ Cannot reach wger.de<br><small style="color:var(--text3);margin-top:6px;display:block">This is blocked in the Claude preview. Download the file and open it locally, or use the Manual tab.</small></div>';}
}

// Pick best translation for current language, fallback to English
function wgerTr(e){
  const lid=LANG_IDS[wgerLang];
  return (e.translations||[]).find(t=>t.language===lid)
    ||(e.translations||[]).find(t=>t.language===2)
    ||(e.translations||[])[0]||{};
}
// Get best description: prefer selected lang, fall back to English, then any
function cleanDesc(s){
  if(!s)return '';
  return s
    .replace(/<\/?(p|div|br|hr)\s*\/?>/gi,'\n')
    .replace(/<li\s*>/gi,'\n• ')
    .replace(/<\/li>/gi,'')
    .replace(/<\/?(ol|ul)\s*>/gi,'\n')
    .replace(/<[^>]*>/g,'')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/[ \t]+/g,' ')
    .replace(/ ?\n ?/g,'\n')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
function wgerDesc(e){
  const lid=LANG_IDS[wgerLang];
  const tryLangs=[lid,2];
  for(const l of tryLangs){
    const tr=(e.translations||[]).find(t=>t.language===l);
    const d=cleanDesc(tr&&tr.description);
    if(d)return d;
  }
  for(const tr of(e.translations||[])){
    const d=cleanDesc(tr.description);
    if(d)return d;
  }
  return '';
}

function pickWgerResult(idx){
  const e=wgerSearchResults[idx]; if(!e)return;
  const tr=wgerTr(e);
  const data={
    name:tr.name||'Exercise',
    description:wgerDesc(e),
    imageUrl:wgerImg((e.images&&e.images[0])?e.images[0].image:''),
  };

  t.exercises.push({id:uid(),name:data.name,description:data.description,imageUrl:data.imageUrl,emoji:'🏋️',s:30});

}

  const u=document.getElementById('pl-upnext');
  u.innerHTML='😮‍💨 UP NEXT'; u.classList.remove('out'); u.classList.add('visible');
  const nx=pl.training.exercises[pl.exerciseIdx+1]; if(nx)say('Next: '+nx.name);
  renderPlayer(); startTick();
}

let pl_shownId=null; // track which exercise is displayed to avoid re-rendering description on tick

function renderPlayerExercise(){
  const e=pl.training.exercises[pl.exerciseIdx];
  const total=pl.training.exercises.length;
  const next=pl.exerciseIdx+1<total?pl.training.exercises[pl.exerciseIdx+1]:null;
  const imgEl=document.getElementById('pl-image');
  const shown = pl.isRest ? (next || e) : e;
  const shownKey=shown.id+(pl.isRest?'_rest':'');

  if(pl_shownId!==shownKey){
    pl_shownId=shownKey;
    document.getElementById('pl-phase').textContent = pl.isRest ? 'REST' : 'EXERCISE';
    document.getElementById('pl-name').textContent = shown.name;
    const descWrap=document.getElementById('pl-desc-wrap');
    const descEl=document.getElementById('pl-desc');
    descWrap.classList.remove('expanded','has-overflow');
    descEl.innerHTML = autolink(shown.description || '');
    document.getElementById('pl-more').textContent='more ▾';
    requestAnimationFrame(()=>{
      if(descEl.scrollHeight>descEl.clientHeight+2) descWrap.classList.add('has-overflow');
    });
    const hasImg = !!shown.imageUrl;
    const isWger=hasImg&&shown.imageUrl.includes('wger.de');
    imgEl.className = 'player-image' + (hasImg ? ' has-img' : '') + (isWger ? ' wger-img' : '');
    imgEl.innerHTML = hasImg ? `<img src="${esc(shown.imageUrl)}" alt="">` : (shown.emoji || '💪');
    document.getElementById('pl-next').innerHTML = !pl.isRest && next ? `Next: <span>${esc(next.name)}</span>` : !pl.isRest ? 'Last exercise!' : next ? `<span>${esc(next.name)}</span>` : '';
    document.getElementById('pl-counter').textContent = `${pl.exerciseIdx+1} / ${total}`;
  }
}

function renderPlayer(){
  const e=pl.training.exercises[pl.exerciseIdx];
  renderPlayerExercise();
  document.getElementById('pl-timer').textContent = pl.secondsLeft;
  const _tm=document.getElementById('pl-timer');_tm.className = 'player-timer' + (pl.isRest ? ' rest-time' : '');_tm.onclick=null;_tm.removeAttribute('role');_tm.removeAttribute('tabindex');
  const maxDur = pl.isRest ? getRestAfter(e, pl.training) : e.s;
  const pct = ((maxDur - pl.secondsLeft) / maxDur) * 100;
  const bar = document.getElementById('pl-bar');
  bar.style.width = pct + '%'; bar.className = 'player-progress-bar' + (pl.isRest ? ' resting' : '');
  document.getElementById('pp-pause').style.display = pl.running ? '' : 'none';
  document.getElementById('pp-play').style.display = pl.running ? 'none' : '';
}

function startTick(){
  clearInterval(pl.timer);
  pl.timer=setInterval(()=>{
    if(!pl.running)return;
    pl.secondsLeft--;
    if(!pl.isRest){const e=pl.training.exercises[pl.exerciseIdx];if(pl.secondsLeft===Math.floor(e.s/2))beep(140,660,1.5);}
    if(pl.secondsLeft<=3&&pl.secondsLeft>0)beep(180,880);
    if(pl.secondsLeft<=0){
      beep(220,784);setTimeout(()=>beep(420,1047),200);
      clearInterval(pl.timer);
      if(pl.isRest){pl.exerciseIdx++;beginExercise();}
      else if(pl.exerciseIdx+1<pl.training.exercises.length){beginRest();}
      else{finishWorkout();}
      return;
    }
    renderPlayer();
  },1000);
}

function playerToggle(){ pl.running=!pl.running; if(pl.running)startTick(); else clearInterval(pl.timer); renderPlayer(); }
function toggleDesc(){
  const w=document.getElementById('pl-desc-wrap'),b=document.getElementById('pl-more');
  const exp=w.classList.toggle('expanded');
  b.textContent=exp?'less ▴':'more ▾';
}
function playerNext(){
  clearInterval(pl.timer);
  if(pl.isRest){pl.exerciseIdx++;beginExercise();}
  else if(pl.exerciseIdx+1<pl.training.exercises.length){beginRest();}
  else finishWorkout();
}
function playerPrev(){
  clearInterval(pl.timer);
  if(pl.isRest){beginExercise();}
  else if(pl.exerciseIdx>0){pl.exerciseIdx--;beginExercise();}
  else{beginExercise();}
}
function exitPlayer(){ clearInterval(pl.timer); pl.running=false; pl_shownId=null; releaseWakeLock(); goDetail(); }
function finishWorkout(){
  clearInterval(pl.timer); pl.running=false; releaseWakeLock();
  // Record completion
  const t=getTraining();
  if(t){t.lastCompleted=new Date().toISOString();save();}
  pl_shownId=null;
  document.getElementById('pl-phase').textContent='DONE';
  document.getElementById('pl-name').textContent='Great job! 🎉';
  document.getElementById('pl-desc').textContent='Workout complete.';
  document.getElementById('pl-desc-wrap').classList.remove('expanded','has-overflow');
  document.getElementById('pl-image').className='player-image';
  document.getElementById('pl-image').innerHTML='🏆';
  const tm=document.getElementById('pl-timer');
  tm.textContent='✓';
  tm.className='player-timer finish-check';
  tm.setAttribute('role','button');
  tm.setAttribute('tabindex','0');
  tm.onclick=goHome;
  document.getElementById('pl-bar').style.width='100%';
  document.getElementById('pl-next').innerHTML='';
  document.getElementById('pl-counter').textContent='Done';
  document.getElementById('pl-upnext').classList.remove('visible');
  document.querySelector('.player-controls').style.display='none';
}

// ─── Audio ────────────────────────────────────────────────────
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
audioCtx.suspend().catch(()=>{});
let _beepActive=0;
function speechVolume(){return state.settings.speechVolume==null?0:state.settings.speechVolume;}
function say(text){const v=speechVolume();if(v<=0||!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=1.05;u.lang='en-US';u.volume=Math.min(1,v);speechSynthesis.speak(u);}
function audioVolume(){return state.settings.audioVolume==null?0.6:state.settings.audioVolume;}
function beep(dur,freq,mult){const v=audioVolume()*(mult||1);if(v<=0)return;try{if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=freq||660;o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime,d=dur/1000,peak=Math.min(1,v*1.5);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(peak,t+0.025);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.start(t);o.stop(t+d+0.02);_beepActive++;o.onended=()=>{_beepActive--;if(_beepActive===0&&audioCtx.state==='running')audioCtx.suspend().catch(()=>{});};}catch(e){}}

// ─── Wake Lock ────────────────────────────────────────────────
let wakeLock=null;
async function requestWakeLock(){
  if('wakeLock' in navigator){try{wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',()=>{wakeLock=null;});}catch(e){}}}
function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null;}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&pl.running)requestWakeLock();});

// ─── Settings / Import / Export ───────────────────────────────
function handleSwWaiting(sw){
  _swWaiting = sw;
  if(autoUpdateEnabled()){ applySwUpdate(); return; }
  toast('New version available!');
  if(document.getElementById('modal').classList.contains('open')) openSettings();
}
function applySwUpdate(){ if(!_swWaiting) return; _swWaiting.postMessage({type:'SKIP_WAITING'}); toast('Updating…'); }
function setAutoUpdate(v){ state.settings.autoUpdate=v; save(); }
function setVolume(v,preview){const n=Number(v);state.settings.audioVolume=n/100;save();const el=document.getElementById('vol-slider');if(el)el.classList.toggle('muted',n<=0);if(preview&&n>0)beep(160,880);}
function setSpeechVolume(v,preview){const n=Number(v);state.settings.speechVolume=n/100;save();const el=document.getElementById('speech-slider');if(el)el.classList.toggle('muted',n<=0);if(preview&&n>0)say('Test');}
function openSettings(){
  const vol=Math.round(audioVolume()*100);
  const svol=Math.round(speechVolume()*100);
  openModal('Settings',`
    <div class="setting-row"><div class="setting-label">Audio Volume<small>Beep sounds during workout — 0 mutes</small></div><input id="vol-slider" type="range" min="0" max="100" value="${vol}" oninput="setVolume(this.value)" onchange="setVolume(this.value,1)" class="${vol<=0?'muted':''}" style="width:140px"></div>
    <div class="setting-row"><div class="setting-label">Speech Volume<small>Speak next exercise (experimental) — 0 mutes</small></div><input id="speech-slider" type="range" min="0" max="100" value="${svol}" oninput="setSpeechVolume(this.value)" onchange="setSpeechVolume(this.value,1)" class="${svol<=0?'muted':''}" style="width:140px"></div>
    <div class="setting-row"><div class="setting-label">Export Data<small>Download all trainings as JSON</small></div><button class="btn btn-secondary" onclick="exportData()">Export</button></div>
    <div class="setting-row"><div class="setting-label">Import Data<small>Load trainings from JSON file</small></div><button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Import</button><input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"></div>
    <div class="setting-row"><div class="setting-label">Reset All<small>Delete everything and start fresh</small></div><button class="btn btn-danger" onclick="resetAll()">Reset</button></div>
    <div class="setting-row"><div class="setting-label">Auto-update<small>Apply app updates automatically on startup</small></div><label class="toggle"><input type="checkbox" ${autoUpdateEnabled()?'checked':''} onchange="setAutoUpdate(this.checked)"><span class="toggle-slider"></span></label></div>
    <div class="setting-row"><div class="setting-label">Version<small>v${APP_VERSION}</small></div><button class="btn ${_swWaiting?'btn-primary':'btn-secondary'}" onclick="checkForUpdate()">${_swWaiting?'Update now':'Check for update'}</button></div>
    <div style="padding:18px 0 4px;text-align:center;color:var(--text2);font-size:13px;line-height:1.7">
      <strong style="color:var(--text);font-size:15px;letter-spacing:.03em">PULSE</strong><br>
      Open-source interval workout timer. Your data stays on your device — nothing is sent to any server.<br>
      Exercise data from <a href="https://wger.de" target="_blank" rel="noopener" style="color:var(--accent)">wger.de</a>.<br>
      <a href="https://github.com/schuhwerk/pulse/" target="_blank" rel="noopener" style="color:var(--accent);font-weight:600">github.com/schuhwerk/pulse</a>
    </div>
  `);
}
function exportData(){
  const d=new Date();
  const yy=String(d.getFullYear()).slice(-2),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  const stamp=yy+mm+dd;
  const payload={...state,exportedAt:d.toISOString()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pulse-backup-'+stamp+'.json';a.click();
  toast('Exported!');
}
function importData(ev){
  const file=ev.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=function(){
    try{
      const d=JSON.parse(r.result);
      // Legacy full-state backup: { trainings:[...], settings:{...} }
      if(d&&Array.isArray(d.trainings)){
        confirmFullImport(d); return;
      }
      // Otherwise treat as a single-training share/export payload
      confirmImportTraining(d);
    }
    catch(e){ toast(e.message||'Invalid file'); }
  };
  r.readAsText(file);
}
function resetAll(){if(!confirm('Delete all data?'))return;state=defaultSecondstate();save();closeModal();goHome();renderHome();toast('Reset!');}

function checkForUpdate(){
  if(_swWaiting){ applySwUpdate(); return; }
  if(!('serviceWorker' in navigator)){toast('Not supported');return;}
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(!reg){toast('No service worker');return;}
    toast('Checking…');
    reg.update().then(()=>{
      // If a waiting worker appeared immediately
      if(reg.waiting){handleSwWaiting(reg.waiting);if(!autoUpdateEnabled())openSettings();return;}
      // If a new worker is installing, wait for it
      if(reg.installing){
        waitForInstalled(reg.installing);return;
      }
      // Otherwise listen briefly for updatefound
      let resolved=false;
      const onUpdate=()=>{resolved=true;reg.removeEventListener('updatefound',onUpdate);waitForInstalled(reg.installing);};
      reg.addEventListener('updatefound',onUpdate);
      setTimeout(()=>{if(!resolved){reg.removeEventListener('updatefound',onUpdate);toast('Already up to date');}},3000);
    }).catch(()=>toast('Update check failed'));
  });
}
function waitForInstalled(sw){
  sw.addEventListener('statechange',()=>{
    if(sw.state==='installed'){
      handleSwWaiting(sw);
      if(!autoUpdateEnabled()){openSettings();toast('Update ready!');}
    }
  });
}

// ─── Modal ────────────────────────────────────────────────────
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('modal').classList.contains('open'))closeModal();});

// ─── Helpers ──────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function autolink(s){return esc(s).replace(/\n/g,'<br>').replace(/(https?:\/\/[^\s<]+)/g,(u)=>{const label=u.length>40?u.slice(0,37)+'…':u;return '<a href="'+u+'" target="_blank" rel="noopener" style="color:var(--accent)">'+label+'</a>';});}
function wgerImg(url){if(!url)return '';return url.startsWith('/')?'https://wger.de'+url:url;}

// ─── Init ─────────────────────────────────────────────────────
routeHash();
renderHome();
if (_pendingUpdate) promptBuiltinUpdate(_pendingUpdate);
window._pulse = { getState: () => state };
</script>
